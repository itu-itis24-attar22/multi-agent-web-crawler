<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Crawler UI" }}</title>
    {% if refresh %}
    <meta http-equiv="refresh" content="{{ refresh }}">
    {% endif %}
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f7f7f9;
            color: #222;
        }
        header {
            background: #1f2937;
            color: white;
            padding: 16px 24px;
        }
        nav a {
            color: white;
            margin-right: 16px;
            text-decoration: none;
            font-weight: bold;
        }
        main {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .grid {
            display: grid;
            gap: 16px;
        }
        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #f3f4f6;
        }
        input, button {
            padding: 10px;
            font-size: 14px;
        }
        button {
            cursor: pointer;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            background: #e5e7eb;
        }
        .ok { background: #d1fae5; }
        .warn { background: #fef3c7; }
        .bad { background: #fee2e2; }
        .mono { font-family: Consolas, monospace; }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('search_page') }}">Search</a>
    </nav>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
